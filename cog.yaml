build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  system_packages:
    - "git"
  python_packages:
    - "torch==2.5.1"
    - "torchvision==0.20.1"
    - "diffusers==0.32.1"
    - "transformers==4.47.1"
    - "accelerate==1.2.1"
    - "imageio==2.37.0"
    - "imageio-ffmpeg==0.6.0"
    - "pillow==11.0.0"
    - "numpy==1.26.4"
    - "peft==0.14.0"
    - "safetensors==0.4.6"
  run:
    # 可选: 预下载模型(注释掉则在首次运行时下载)
    # - huggingface-cli download Phr00t/WAN2.2-14B-Rapid-AllInOne --include "Mega-v12/*" --local-dir ./model_cache || true

predict: "predict.py:Predictor"

# GPU 硬件选择在 Replicate 网站配置
# 14B 模型需要至少 24GB 显存,推荐:
# - A40 (48GB) - 性价比高 ~$0.001400/sec
# - A100-40GB - 性能好 ~$0.002300/sec
# - A100-80GB - 大显存 ~$0.003750/sec
# - H100 (80GB) - 最快 ~$0.004400/sec
# - 8x H100 - 多GPU ~$0.012200/sec
